<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" font-family="'Georgia', serif">

  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f953c6"/>
      <stop offset="100%" style="stop-color:#b91d73"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Decorative stars scattered -->
  <text x="40" y="60" font-size="18" fill="#ffd200" opacity="0.6" filter="url(#glow)">★</text>
  <text x="730" y="80" font-size="12" fill="#ffd200" opacity="0.4">★</text>
  <text x="760" y="200" font-size="22" fill="#f953c6" opacity="0.5" filter="url(#glow)">★</text>
  <text x="20" y="280" font-size="16" fill="#ffd200" opacity="0.3">★</text>
  <text x="700" y="420" font-size="14" fill="#ffd200" opacity="0.5">★</text>
  <text x="60" y="450" font-size="10" fill="#f953c6" opacity="0.4">★</text>
  <text x="400" y="30" font-size="10" fill="#ffd200" opacity="0.3">★</text>
  <text x="650" y="130" font-size="8" fill="#fff" opacity="0.2">★</text>
  <text x="130" y="110" font-size="8" fill="#fff" opacity="0.2">★</text>

  <!-- Top label -->
  <rect x="290" y="28" width="220" height="28" fill="#f953c6" rx="14" opacity="0.9"/>
  <text x="400" y="47" text-anchor="middle" font-size="12" fill="white" font-weight="bold" letter-spacing="2">🎵 TIKTOK VIRAL TREND</text>

  <!-- Main BIG lyric: STAR STAR STAR -->
  <text x="400" y="130" text-anchor="middle" font-size="62" font-weight="bold"
        fill="url(#goldGrad)" filter="url(#softglow)" letter-spacing="8">
    ★ STAR ★ STAR ★ STAR
  </text>

  <!-- Divider line -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Key lyric line 1 -->
  <text x="400" y="205" text-anchor="middle" font-size="28" font-weight="bold"
        fill="white" filter="url(#glow)" letter-spacing="1">
    "I get money —
  </text>
  <text x="400" y="248" text-anchor="middle" font-size="36" font-weight="bold"
        fill="url(#goldGrad)" filter="url(#softglow)" letter-spacing="2">
    I'm a ★ STAR"
  </text>

  <!-- Japanese line -->
  <text x="400" y="295" text-anchor="middle" font-size="17" fill="#c9a0ff" opacity="0.9" letter-spacing="4">
    お金稼ぐ、私はスター
  </text>
  <text x="400" y="316" text-anchor="middle" font-size="12" fill="#888" letter-spacing="1">
    (I earn money, I am a star)
  </text>

  <!-- Divider -->
  <line x1="200" y1="335" x2="600" y2="335" stroke="#f953c6" stroke-width="1" opacity="0.3"/>

  <!-- Confidence line -->
  <text x="400" y="368" text-anchor="middle" font-size="16" fill="#f0f0f0" opacity="0.85" font-style="italic">
    "He knows who I am — ain't had to say my name"
  </text>

  <!-- Song info -->
  <text x="400" y="408" text-anchor="middle" font-size="13" fill="#aaa" letter-spacing="1">
    Megan Thee Stallion ft. Yuki Chiba  ·  MAMUSHI  ·  2024
  </text>

  <!-- Bottom stats bar -->
  <rect x="80" y="433" width="640" height="58" fill="white" rx="10" opacity="0.07"/>

  <text x="190" y="455" text-anchor="middle" font-size="11" fill="#ffd200">🎵 TikTok Videos</text>
  <text x="190" y="475" text-anchor="middle" font-size="18" font-weight="bold" fill="white">157,000+</text>

  <line x1="310" y1="440" x2="310" y2="483" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <text x="400" y="455" text-anchor="middle" font-size="11" fill="#f953c6">💃 Dance Creator</text>
  <text x="400" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="white">@mona712_official</text>

  <line x1="490" y1="440" x2="490" y2="483" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <text x="600" y="455" text-anchor="middle" font-size="11" fill="#c9a0ff">🌏 Duolingo Spike</text>
  <text x="600" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Japanese Searches ▲</text>

</svg>
