<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="720" height="520" fill="#fafaf7" rx="12"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">
    Emotional Value → Demand Curve Shifts Rightward
  </text>
  <text x="360" y="58" text-anchor="middle" font-size="13" fill="#555">
    AP Microeconomics: New Equilibrium at Higher P* and Higher Q*
  </text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="430" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- X axis -->
  <line x1="100" y1="430" x2="650" y2="430" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Axis labels -->
  <text x="60" y="260" text-anchor="middle" font-size="15" fill="#333" transform="rotate(-90,60,260)">Price (P)</text>
  <text x="390" y="470" text-anchor="middle" font-size="15" fill="#333">Quantity (Q)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a6ebb"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Supply curve S (unchanged) -->
  <!-- S goes from bottom-left to top-right: (130,390) to (480,130) -->
  <line x1="130" y1="400" x2="500" y2="130" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="0"/>
  <text x="508" y="125" font-size="14" fill="#27ae60" font-weight="bold">S</text>

  <!-- Original Demand curve D1 -->
  <!-- D1: downward sloping, (150,140) to (520,400) -->
  <line x1="150" y1="145" x2="530" y2="405" stroke="#2a6ebb" stroke-width="2.5"/>
  <text x="538" y="410" font-size="14" fill="#2a6ebb" font-weight="bold">D₁</text>

  <!-- New Demand curve D2 (shifted right) -->
  <!-- D2: same slope, shifted ~130px right: (280,145) to (620,390) -->
  <line x1="280" y1="145" x2="630" y2="405" stroke="#c0392b" stroke-width="2.5"/>
  <text x="550" y="143" font-size="14" fill="#c0392b" font-weight="bold">D₂</text>

  <!-- Shift arrow between D1 and D2 -->
  <line x1="370" y1="220" x2="480" y2="220" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowShift)" stroke-dasharray="0"/>
  <defs>
    <marker id="arrowShift" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>
  <text x="415" y="213" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="bold">Shift →</text>

  <!-- Equilibrium 1: intersection of S and D1 -->
  <!-- S: y = -0.676x + 527.8; D1: y = 0.676x - 57.2 → solve -->
  <!-- approx E1 at (435, 242) -->
  <circle cx="278" cy="300" r="6" fill="#2a6ebb"/>

  <!-- Equilibrium 2: intersection of S and D2 -->
  <!-- shifted right ~130px → approx E2 at (565, 155) -->
  <circle cx="403" cy="232" r="6" fill="#c0392b"/>

  <!-- Dashed lines for E1 -->
  <line x1="100" y1="300" x2="278" y2="300" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="278" y1="300" x2="278" y2="430" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Dashed lines for E2 -->
  <line x1="100" y1="232" x2="403" y2="232" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="403" y1="232" x2="403" y2="430" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- P labels on Y axis -->
  <text x="88" y="305" text-anchor="end" font-size="13" fill="#2a6ebb" font-weight="bold">P₁*</text>
  <text x="88" y="237" text-anchor="end" font-size="13" fill="#c0392b" font-weight="bold">P₂*</text>

  <!-- Q labels on X axis -->
  <text x="278" y="450" text-anchor="middle" font-size="13" fill="#2a6ebb" font-weight="bold">Q₁*</text>
  <text x="403" y="450" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">Q₂*</text>

  <!-- ΔP arrow on Y axis -->
  <line x1="75" y1="300" x2="75" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDelta)" marker-start="url(#arrowDeltaStart)"/>
  <defs>
    <marker id="arrowDelta" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#555"/>
    </marker>
    <marker id="arrowDeltaStart" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L6,3 z" fill="#555"/>
    </marker>
  </defs>
  <text x="57" y="270" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,57,270)">↑ P rises</text>

  <!-- ΔQ arrow on X axis -->
  <line x1="278" y1="445" x2="403" y2="445" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDelta)"/>
  <text x="340" y="460" text-anchor="middle" font-size="11" fill="#555">Q rises →</text>

  <!-- Legend box -->
  <rect x="108" y="88" width="220" height="95" fill="white" stroke="#ccc" stroke-width="1" rx="6" opacity="0.9"/>
  <line x1="118" y1="107" x2="148" y2="107" stroke="#27ae60" stroke-width="2.5"/>
  <text x="155" y="111" font-size="12" fill="#27ae60">Supply (unchanged)</text>
  <line x1="118" y1="127" x2="148" y2="127" stroke="#2a6ebb" stroke-width="2.5"/>
  <text x="155" y="131" font-size="12" fill="#2a6ebb">D₁ — Original Demand</text>
  <line x1="118" y1="147" x2="148" y2="147" stroke="#c0392b" stroke-width="2.5"/>
  <text x="155" y="151" font-size="12" fill="#c0392b">D₂ — New Demand (Shifted)</text>
  <circle cx="130" cy="165" r="5" fill="#555"/>
  <text x="155" y="169" font-size="12" fill="#555">Equilibrium points E₁, E₂</text>

  <!-- Bottom annotation -->
  <rect x="108" y="478" width="504" height="32" fill="#fff8e1" stroke="#f0c040" stroke-width="1" rx="6"/>
  <text x="360" y="499" text-anchor="middle" font-size="12.5" fill="#7a5800">
    Emotional value (FOMO, status, virality) → D shifts right → P* ↑ and Q* ↑ → Producer Surplus ↑
  </text>

</svg>
